name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - name: Restore
        run: dotnet restore ./controle-gastos/backend/ControleGastosAPI
      - name: Build
        run: dotnet build ./controle-gastos/backend/ControleGastosAPI --no-restore --configuration Release

  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: './controle-gastos/frontend/package-lock.json'
      - name: Install dependencies
        run: npm ci
        working-directory: ./controle-gastos/frontend
      - name: Build
        run: npm run build
        working-directory: ./controle-gastos/frontend
